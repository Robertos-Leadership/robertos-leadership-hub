<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="manifest" href="site.webmanifest">
<meta name="theme-color" content="#6B1F2A">
<title>Roberto's Front of House</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --bg: #F5F0E8;
    --bg-deep: #EDE7D9;
    --surface: #FFFFFF;
    --surface2: #FAF7F2;
    --surface3: #F0EBE0;
    --vino: #6B1F2A;
    --vino-dark: #4A1520;
    --vino-light: #8B3040;
    --vino-mid: #5e0a10;
    --vino-dim: rgba(107,31,42,0.5);
    --gold: #C9A84C;
    --gold-light: #E4C97A;
    --gold-dim: #A88930;
    --text: #2C1810;
    --text-mid: #5C3D2E;
    --text-light: #8B7355;
    --red: #c0392b;
    --amber: #d4870a;
    --blue: #315F7C;
    --green: #2d7a4f;
    --border: rgba(107,31,42,0.12);
    --border-strong: rgba(107,31,42,0.3);
    --shadow: 0 2px 12px rgba(44,24,16,0.08);
    /* Kitchen App CSS var aliases — used by schedule module */
    --sabbia: #e8ddd0;
    --sabbia-light: #f0ebe2;
    --sabbia-dark: #d4c5b4;
    --oliva: #4b5128;
    --ink: #2C1810;
    --cream: #f5ede0;
    --font-serif: 'Playfair Display', Georgia, serif;
    --font-sans: 'Inter', sans-serif;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  /* -- LOGIN -- */
  #login {
    min-height: 100vh;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 32px 20px;
    position: relative;
    background:
      linear-gradient(180deg, rgba(74,21,32,0.86) 0%, rgba(44,24,16,0.92) 100%),
      url('https://cdn.prod.website-files.com/68b1adb67aae8a1c4f33bfa5/6978863119fac3dc920f9f63_Home%20Gallery%20Image%20-%20Dubai%20-%20Scala.jpg') center/cover fixed;
  }
  #login.open { display: flex; }
  .login-panel {
    position: relative;
    background: #F8F4EC;
    width: 100%;
    max-width: 420px;
    padding: 48px 44px 40px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.45);
    text-align: center;
  }
  .login-panel::before {
    content:'';
    position:absolute;
    top:0;left:0;right:0;
    height:3px;
    background: linear-gradient(90deg, var(--gold) 0%, var(--gold-light) 50%, var(--gold) 100%);
  }
  .login-brand {
    display: block;
    width: 100%;
    max-width: 220px;
    height: auto;
    margin: 0 auto 24px;
  }
  .login-kicker {
    color: var(--gold-dim);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .login-title {
    font-family: 'Playfair Display', serif;
    font-size: 34px;
    font-style: italic;
    font-weight: 400;
    color: var(--vino);
    margin-bottom: 18px;
  }
  .login-divider {
    width: 56px;
    height: 1px;
    background: var(--gold);
    margin: 0 auto 28px;
  }
  .login-form { text-align: left; }
  .login-label {
    display: block;
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--text-light);
    margin-bottom: 7px;
  }
  .login-input {
    width: 100%;
    background: #FFFFFF;
    border: 1px solid var(--border-strong);
    padding: 13px 15px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    color: var(--text);
    margin-bottom: 18px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .login-input:focus {
    outline: none;
    border-color: var(--vino);
    box-shadow: 0 0 0 3px rgba(107,31,42,0.08);
  }
  .login-btn {
    width: 100%;
    background: var(--vino);
    color: #FFFFFF;
    border: none;
    padding: 15px;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    margin-top: 4px;
    transition: background 0.2s;
  }
  .login-btn:hover { background: var(--vino-dark); }
  .login-btn:disabled { opacity: 0.6; cursor: default; }
  .login-error {
    color: var(--red);
    font-size: 12px;
    min-height: 18px;
    margin-top: 14px;
    text-align: center;
  }
  .login-foot {
    position: absolute;
    bottom: 22px;
    left: 0;
    right: 0;
    text-align: center;
    color: rgba(255,255,255,0.55);
    font-size: 10px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    pointer-events: none;
  }
  @media (max-width: 520px) {
    .login-panel { padding: 38px 26px 32px; }
    #login { background-attachment: scroll; }
  }
  .topbar-signout {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.3);
    color: rgba(255,255,255,0.75);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 5px 12px;
    cursor: pointer;
    margin-left: 14px;
    transition: all 0.2s;
  }
  .topbar-signout:hover { border-color: #fff; color: #fff; }
  .landing-signout {
    margin-top: 34px;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-light);
    cursor: pointer;
  }
  .landing-signout:hover { color: var(--vino); }

  /* -- EVENT OVERVIEW -- */
  .overview-card {
    background: var(--vino);
    border: 1px solid var(--vino-dark);
    box-shadow: var(--shadow);
    padding: 16px 28px 18px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }
  .overview-card::before {
    content:'';
    position:absolute;
    top:0;left:0;right:0;
    height:3px;
    background: linear-gradient(90deg, var(--gold) 0%, transparent 60%);
  }
  .overview-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .overview-title {
    font-size: 9px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--gold-light);
    font-weight: 600;
  }
  .overview-edit {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.35);
    color: rgba(255,255,255,0.85);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 5px 14px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .overview-edit:hover { border-color: var(--gold-light); color: var(--gold-light); }
  .overview-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
  }
  .overview-label {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.6);
    margin-bottom: 6px;
  }
  .overview-value {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    color: #FFFFFF;
    line-height: 1.35;
  }
  .overview-value.muted { color: rgba(255,255,255,0.45); font-style: italic; font-family: 'Inter', sans-serif; font-size: 15px; }
  @media (max-width: 720px) {
    .overview-grid { grid-template-columns: 1fr; gap: 12px; }
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  /* -- LANDING -- */
  #landing {
    min-height: 100vh;
    display: none;
    grid-template-columns: minmax(0, 0.92fr) minmax(360px, 0.78fr);
    background: #F8F4EC;
    position: relative;
    overflow: hidden;
  }
  #landing::before {
    content:'';
    position:absolute;
    inset:0;
    background:
      linear-gradient(90deg, rgba(248,244,236,0.98) 0%, rgba(248,244,236,0.92) 48%, rgba(74,21,32,0.16) 100%),
      repeating-linear-gradient(0deg, transparent, transparent 72px, rgba(107,31,42,0.045) 72px, rgba(107,31,42,0.045) 73px);
    pointer-events:none;
  }
  #landing::after {
    content:'';
    position:absolute;
    top:0;
    right:0;
    width: 46%;
    height:100%;
    background:
      linear-gradient(180deg, rgba(44,24,16,0.08), rgba(44,24,16,0.28)),
      url('https://cdn.prod.website-files.com/68b1adb67aae8a1c4f33bfa5/6978863119fac3dc920f9f63_Home%20Gallery%20Image%20-%20Dubai%20-%20Scala.jpg') center/cover;
    clip-path: polygon(14% 0, 100% 0, 100% 100%, 0 100%);
  }
  .landing-content {
    position: relative;
    z-index: 2;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 64px clamp(28px, 7vw, 104px);
  }
  .landing-brand {
    width: min(330px, 72vw);
    height: auto;
    margin-bottom: 40px;
  }
  .landing-kicker {
    color: var(--vino);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    margin-bottom: 18px;
  }
  .landing-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(42px, 6vw, 82px);
    font-weight: 400;
    color: var(--vino-dark);
    line-height: 0.98;
    letter-spacing: 0;
    margin-bottom: 20px;
    max-width: 760px;
  }
  .landing-title span {
    color: var(--vino);
    font-style: italic;
  }
  .landing-sub {
    font-size: 13px;
    color: var(--text-mid);
    line-height: 1.8;
    max-width: 420px;
    margin-bottom: 44px;
    letter-spacing: 0;
  }
  .landing-divider {
    width: 72px;
    height: 1px;
    background: var(--gold);
    margin: 0 0 28px;
  }
  .module-grid {
    display: flex;
    flex-direction: column;
    max-width: 620px;
    width: 100%;
    border-top: 1px solid rgba(107,31,42,0.18);
  }
  .module-card {
    background: transparent;
    border-bottom: 1px solid rgba(107,31,42,0.18);
    padding: 20px 0;
    cursor: pointer;
    transition: padding 0.2s, border-color 0.2s;
    position: relative;
    overflow: hidden;
  }
  .module-card::after {
    content:'->';
    position:absolute;
    right:0;
    top:22px;
    color: var(--vino);
    font-size: 18px;
    transform: translateX(-8px);
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
  }
  .module-card:hover { padding-left: 10px; border-color: rgba(107,31,42,0.36); }
  .module-card:hover::after { opacity: 1; transform: translateX(0); }
  .module-card.coming-soon { opacity: 0.42; cursor: default; }
  .module-card.coming-soon:hover { padding-left: 0; border-color: rgba(107,31,42,0.18); }
  .module-card.coming-soon::after { display:none; }
  .module-tag {
    font-size: 9px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold-dim);
    margin-bottom: 8px;
  }
  .module-name {
    font-family: 'Playfair Display', serif;
    font-size: 25px;
    color: var(--vino-dark);
    margin-bottom: 8px;
  }
  .module-desc {
    font-size: 12px;
    color: var(--text-light);
    line-height: 1.6;
    max-width: 430px;
  }
  .module-badge {
    display: inline-block;
    margin-top: 14px;
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--vino);
    border: 1px solid rgba(107,31,42,0.22);
    padding: 3px 8px;
  }

  /* -- FOH HERO HEADER -- */
  .foh-hero {
    position: relative;
    height: 42%;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    overflow: hidden;
    flex-shrink: 0;
  }
  .foh-hero-bg {
    position: absolute;
    inset: 0;
    background:
      url('robertos-interior.jpg') center 30%/cover;
  }
  .foh-hero-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      180deg,
      rgba(44,24,16,0.08) 0%,
      rgba(44,24,16,0.18) 50%,
      rgba(44,24,16,0.72) 100%
    );
  }
  .foh-hero-content {
    position: absolute;
    inset: 0;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .foh-hero-logo {
    width: min(240px, 58vw);
    height: auto;
    display: block;
    margin-bottom: 8px;
    mix-blend-mode: multiply;
    opacity: 1;
  }
  .foh-hero-sub {
    font-size: 9px;
    letter-spacing: 0.34em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.65);
    text-align: center;
  }
  .foh-hero-date {
    position: absolute;
    top: 16px;
    right: 20px;
    font-size: 10px;
    letter-spacing: 0.12em;
    color: rgba(255,255,255,0.55);
    text-align: right;
    z-index: 2;
    line-height: 1.5;
  }

  /* -- APP SHELL -- */
  #app { display:none; min-height:100vh; }

  /* -- TOP NAR -- */
  .topbar {
    background: var(--vino);
    border-bottom: 1px solid var(--vino-dark);
    padding: 0 24px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(44,24,16,0.15);
  }
  .topbar-left {
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .topbar-logo {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    color: #FFFFFF;
    letter-spacing: 0.05em;
    cursor: pointer;
  }
  .topbar-sep { color: rgba(255,255,255,0.3); font-size: 16px; }
  .topbar-section {
    font-size: 12px;
    color: rgba(255,255,255,0.6);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .nav-tabs {
    display: flex;
    gap: 0;
  }
  .nav-tab {
    padding: 0 18px;
    height: 52px;
    display: flex;
    align-items: center;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.6);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .nav-tab:hover { color: #FFFFFF; }
  .nav-tab.active { color: var(--gold-light); border-bottom-color: var(--gold-light); }

  /* -- MAIN CONTENT -- */
  .main { padding: 28px 24px; max-width: 1200px; margin: 0 auto; }

  /* -- DASHBOARD -- */
  .dashboard-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 28px;
    flex-wrap: wrap;
    gap: 16px;
  }
  .page-title {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    color: var(--cream);
  }
  .page-sub {
    font-size: 12px;
    color: var(--cream-dim);
    margin-top: 4px;
  }

  /* countdown cards */
  .countdown-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 28px;
  }
  .countdown-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 20px 24px;
    position: relative;
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  .countdown-card::before {
    content:'';
    position:absolute;
    top:0; left:0; right:0;
    height:3px;
    background: linear-gradient(90deg, var(--vino), transparent);
  }
  .cd-event { font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--vino); margin-bottom: 6px; }
  .cd-name { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--text); margin-bottom: 12px; }
  .cd-timer { font-size: 36px; font-weight: 300; color: var(--vino); line-height: 1; }
  .cd-timer span { font-size: 13px; color: var(--text-light); margin-left: 6px; }
  .cd-meta { font-size: 11px; color: var(--text-light); margin-top: 8px; }
  .cd-progress { margin-top: 14px; }
  .cd-progress-label { display:flex; justify-content:space-between; font-size:10px; color:var(--text-light); margin-bottom:5px; }
  .progress-bar { height: 3px; background: var(--bg-deep); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--vino); transition: width 0.4s; }

  /* stats row */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
    margin-bottom: 28px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 16px 20px;
    box-shadow: var(--shadow);
  }
  .stat-label { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-light); margin-bottom: 8px; }
  .stat-value { font-family: 'Playfair Display', serif; font-size: 28px; color: var(--text); }
  .stat-note { font-size: 10px; color: var(--text-light); margin-top: 4px; line-height: 1.4; }
  .stat-value.red { color: var(--red); }
  .stat-value.amber { color: var(--amber); }
  .stat-value.green { color: var(--green); }

  /* pipeline */
  .section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .section-title {
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--vino);
  }
  .pipeline-table {
    width: 100%;
    border-collapse: collapse;
    background: var(--surface);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
  }
  .pipeline-table th {
    text-align: left;
    padding: 10px 16px;
    font-size: 9px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-light);
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }
  .pipeline-table td {
    padding: 11px 16px;
    font-size: 12px;
    color: var(--text);
    border-bottom: 1px solid rgba(107,31,42,0.06);
    vertical-align: middle;
  }
  .pipeline-table tr:last-child td { border-bottom: none; }
  .pipeline-table tr.overdue td { background: rgba(192,57,43,0.04); }
  .pipeline-table tr:hover td { background: var(--surface2); }

  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 2px 9px;
    border-radius: 2px;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 500;
  }
  .status-pill.not_started { background: rgba(139,115,85,0.1); color: var(--text-light); }
  .status-pill.in_progress { background: rgba(212,135,10,0.1); color: var(--amber); }
  .status-pill.done { background: rgba(45,122,79,0.1); color: var(--green); }
  .status-pill.blocked { background: rgba(192,57,43,0.1); color: var(--red); }

  .status-select {
    width: 100%;
    min-width: 116px;
    appearance: none;
    background-color: var(--surface2);
    background-image: linear-gradient(45deg, transparent 50%, var(--vino) 50%), linear-gradient(135deg, var(--vino) 50%, transparent 50%);
    background-position: calc(100% - 14px) 50%, calc(100% - 9px) 50%;
    background-size: 5px 5px, 5px 5px;
    background-repeat: no-repeat;
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--text);
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 500;
    line-height: 1.2;
    outline: none;
    padding: 6px 26px 6px 8px;
    text-transform: uppercase;
  }
  .status-select:hover { border-color: var(--border-strong); background-color: var(--surface); }
  .status-select:focus { border-color: var(--vino); box-shadow: 0 0 0 2px rgba(107,31,42,0.08); }
  .status-select option { background: var(--surface); color: var(--text); text-transform: none; }

  .priority-pill {
    display: inline-flex;
    align-items: center;
    width: fit-content;
    padding: 3px 8px;
    border-radius: 2px;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    border: 1px solid transparent;
    white-space: nowrap;
  }
  .priority-pill.non_negotiable { background: rgba(192,57,43,0.16); border-color: rgba(192,57,43,0.48); color: var(--red); }
  .priority-pill.important { background: rgba(201,168,76,0.22); border-color: rgba(201,168,76,0.62); color: var(--gold-dim); }
  .priority-pill.enhancement { background: rgba(49,95,124,0.14); border-color: rgba(49,95,124,0.42); color: var(--blue); }

  .owner-filter {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;

  /* -- Review: hierarchy-driven layout -- */
  .rv2-hero { border:1px solid var(--border); background:var(--surface); padding:24px 26px; margin:12px 0 16px; }

  .rv2-bignum { display:flex; align-items:baseline; gap:14px; flex-wrap:wrap; }

  .rv2-track { height:10px; background:var(--surface3); margin:16px 0 8px; position:relative; }

  /* thin supporting stat row */

  .rv2-stat { flex:1; min-width:120px; padding:12px 16px; border-right:1px solid var(--border); }
  .rv2-stat:last-child { border-right:none; }

  .rv2-stat .v.green { color:var(--green); } .rv2-stat .v.red { color:var(--red); }
  /* revenue mix single stacked bar */
  .rv2-mix-head { display:flex; justify-content:space-between; align-items:baseline; margin:18px 0 8px; }
  .rv2-mix-title { font-size:10px; letter-spacing:0.2em; text-transform:uppercase; color:var(--text-light); font-weight:600; }

  .rv2-mixbar .food { background:var(--vino); }
  .rv2-mixbar .bev  { background:var(--gold-dim); }
  .rv2-mixbar .comp { background:var(--text-light); }
  .rv2-mixlegend { display:flex; gap:18px; margin-top:9px; flex-wrap:wrap; }
  .rv2-mixlegend span { font-size:11px; color:var(--text-mid); display:flex; align-items:center; gap:6px; }
  .rv2-mixlegend i { width:10px; height:10px; display:inline-block; }
  .rv2-mixlegend .food { background:var(--vino); } .rv2-mixlegend .bev { background:var(--gold-dim); } .rv2-mixlegend .comp { background:var(--text-light); }
  /* net result line */
  .rv2-net { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; padding:18px 22px; border:1px solid var(--border); margin:18px 0 4px; }
  .rv2-net.good { border-left:4px solid var(--green); } .rv2-net.bad { border-left:4px solid var(--red); }
  .rv2-net-l { font-size:11px; letter-spacing:0.18em; text-transform:uppercase; color:var(--text-light); }
  .rv2-net-calc { font-size:12px; color:var(--text-light); margin-top:3px; }
  .rv2-net-v { font-family:'Playfair Display',serif; font-size:34px; line-height:1; }
  .rv2-net.good .rv2-net-v { color:var(--green); } .rv2-net.bad .rv2-net-v { color:var(--red); }
  /* P&L cascade */
  .rv2-pl { border:1px solid var(--border); margin:18px 0 4px; background:var(--surface); }
  .rv2-pl-row { display:flex; align-items:center; justify-content:space-between; padding:11px 18px; font-size:13px; color:var(--text-mid); }

  .rv2-pl-row.gross.good .v { color:var(--green); } .rv2-pl-row.gross.bad .v { color:var(--red); }
  .rv2-pl-row.net { border-top:2px solid var(--border-strong); }

  @media(max-width:760px){

    gap: 12px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
  }
  .task-row-header span {
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-light);
  }
  .task-title-cell { display: flex; flex-direction: column; gap: 3px; }
  .task-name { font-size: 13px; color: var(--text); }
  .task-notes-preview { font-size: 11px; color: var(--text-light); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 280px; }
  .task-member {
    font-size: 11px;
    color: var(--text-mid);
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .member-dot {
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--vino);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    color: #FFFFFF;
    font-weight: 600;
    flex-shrink: 0;
  }
  .task-date { font-size: 11px; color: var(--text-light); }
  .task-date.overdue { color: var(--red); font-weight: 600; }
  .task-actions { display: flex; gap: 6px; justify-content: flex-end; flex-wrap: wrap; position: relative; }
  .more-btn { font-size: 15px; padding: 4px 10px; line-height: 1; }
  .task-menu {
    display: none; position: absolute; right: 0; top: 30px;
    background: var(--surface); border: 1px solid var(--border-strong);
    box-shadow: 0 8px 24px rgba(44,24,16,0.18); z-index: 50; min-width: 140px;
  }
  .task-menu.open { display: block; }
  .task-menu button {
    display: block; width: 100%; text-align: left; background: none; border: none;
    padding: 9px 14px; font-family: 'Inter', sans-serif; font-size: 11px;
    letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-mid); cursor: pointer;
  }
  .task-menu button:hover { background: var(--surface2); color: var(--vino); }
  .task-menu button.danger { color: var(--red); }
  .quick-action {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-mid);
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    letter-spacing: 0.08em;
    padding: 7px 12px;
    min-width: 38px;
    min-height: 32px;
    text-transform: uppercase;
  }
  .quick-action:hover { border-color: var(--vino); color: var(--vino); }
  .icon-btn {
    background: none;
    border: none;
    color: var(--text-light);
    cursor: pointer;
    padding: 4px;
    font-size: 14px;
    transition: color 0.15s;
  }
  .icon-btn:hover { color: var(--vino); }

  /* add task bar */
  .add-task-bar {
    display: grid;
    grid-template-columns: minmax(220px, 1fr) minmax(120px, 150px) minmax(130px, 150px) minmax(130px, 150px) auto;
    gap: 8px;
    padding: 14px 20px;
    background: var(--surface2);
    border-top: 1px solid var(--border);
    align-items: center;
  }
  .add-task-bar input, .add-task-bar select {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    padding: 7px 12px;
    outline: none;
    width: 100%;
    min-width: 120px;
  }
  .add-task-bar input:focus, .add-task-bar select:focus {
    border-color: var(--vino-dim);
  }
  .add-task-bar select option { background: var(--surface); }
  .add-task-bar .btn { min-height: 32px; white-space: nowrap; }
  .leader-task-list { display:flex; flex-direction:column; gap:14px; margin-bottom:24px; }
  .leader-event-group { background:var(--surface); border:1px solid var(--border); box-shadow:var(--shadow); }
  .leader-event-group-head { display:flex; align-items:center; justify-content:space-between; gap:12px; padding:11px 14px; border-bottom:1px solid var(--border); background:var(--surface2); }
  .leader-event-group-title { font-size:10px; letter-spacing:0.17em; text-transform:uppercase; color:var(--vino); font-weight:600; }
  .leader-event-group-count { font-size:11px; color:var(--text-light); }
  .leader-task-card { border-bottom:1px solid rgba(107,31,42,0.08); border-left:4px solid #CFC2AB; background:var(--surface); padding:12px 14px; display:grid; grid-template-columns:1fr auto; gap:12px; align-items:center; }
  .leader-task-card:last-child { border-bottom:none; }
  .leader-task-card.s-in_progress { border-left-color:var(--amber); }
  .leader-task-card.s-done { border-left-color:var(--green); }
  .leader-task-card.s-blocked { border-left-color:var(--red); background:rgba(192,57,43,0.03); }
  .leader-summary-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(190px, 1fr)); gap:10px; margin:-6px 0 22px; }
  .leader-summary-card { background:var(--surface); border:1px solid var(--border); box-shadow:var(--shadow); padding:14px 15px; cursor:pointer; min-height:120px; }
  .leader-summary-card:hover { border-color:var(--vino); }
  .leader-summary-name { font-size:10px; letter-spacing:0.16em; text-transform:uppercase; color:var(--vino); font-weight:600; margin-bottom:8px; }
  .leader-summary-total { font-family:'Playfair Display',serif; font-size:28px; color:var(--text); margin-bottom:9px; }
  .leader-summary-done { font-size:11px; color:var(--green); font-weight:600; margin:-4px 0 8px; }
  .leader-summary-breakdown { display:flex; flex-wrap:wrap; gap:5px; }
  .leader-actions-row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; justify-content:space-between; margin-bottom:12px; }

  /* finance track */
  .finance-row {
    display: grid;
    grid-template-columns: 1.5fr 1fr 1fr 1fr 1fr 80px;
    align-items: center;
    padding: 12px 20px;
    border-bottom: 1px solid rgba(107,31,42,0.06);
    gap: 12px;
  }
  .finance-row:last-child { border-bottom: none; }
  .finance-row:hover { background: var(--surface2); }
  .finance-row-header {
    display: grid;
    grid-template-columns: 1.5fr 1fr 1fr 1fr 1fr 80px;
    padding: 8px 20px;
    gap: 12px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
  }
  .finance-row-header span {
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-light);
  }
  .report-row {
    display:grid;
    grid-template-columns:1.4fr repeat(6, 1fr);
    gap:10px;
    align-items:center;
    padding:11px 0;
    border-bottom:1px solid var(--border);
    font-size:11px;
    color:var(--text-mid);
  }
  .report-row.header {
    font-size:9px;
    letter-spacing:0.16em;
    text-transform:uppercase;
    color:var(--text-light);
  }
  .report-row strong { color:var(--text); font-weight:600; }
  .report-note { font-size:11px; color:var(--text-light); line-height:1.5; margin-top:12px; }
  .amount-cell { font-family: 'Playfair Display', serif; font-size: 16px; color: var(--vino); }
  .contract-pill {
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 2px 8px;
    border: 1px solid;
  }
  .contract-pill.not_sent { border-color: var(--border); color: var(--text-light); }
  .contract-pill.sent { border-color: rgba(212,135,10,0.4); color: var(--amber); }
  .contract-pill.signed { border-color: rgba(45,122,79,0.4); color: var(--green); }

  /* modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(44,24,16,0.6);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border-strong);
    width: 520px;
    max-width: 95vw;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(44,24,16,0.2);
  }
  .modal.wide { width: min(940px, 95vw); }
  .modal-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--vino);
    position: sticky;
    top: 0;
  }
  .modal-title { font-family: 'Playfair Display', serif; font-size: 18px; color: #FFFFFF; }
  .modal-close { background: none; border: none; color: rgba(255,255,255,0.6); font-size: 20px; cursor: pointer; }
  .modal-close:hover { color: #FFFFFF; }
  .modal-body { padding: 24px; }
  .form-group { margin-bottom: 18px; }
  .form-label { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-light); margin-bottom: 7px; display: block; }
  .form-input, .form-select, .form-textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus {
    border-color: var(--vino-dim);
  }
  .form-select option { background: var(--surface); }
  .form-textarea { resize: vertical; min-height: 80px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  /* -- Finance worksheet (Enter Results) -- */
  .fin-sheet { font-family:'Inter',sans-serif; }
  .fin-section { margin-bottom: 22px; }
  .fin-section-head {
    display:flex; align-items:baseline; justify-content:space-between;
    font-size:10px; letter-spacing:0.22em; text-transform:uppercase;
    color:var(--vino); font-weight:600;
    padding-bottom:8px; margin-bottom:10px;
    border-bottom:1px solid var(--border);
  }
  .fin-section-head .hint { color:var(--text-light); font-weight:400; letter-spacing:0.08em; }
  .fin-line {
    display:grid; grid-template-columns: 1fr 168px; align-items:center;
    gap:12px; padding:7px 0;
  }
  .fin-line + .fin-line { border-top:1px solid rgba(107,31,42,0.05); }
  .fin-line label { font-size:13px; color:var(--text-mid); }
  .fin-line label .sub { display:block; font-size:10px; color:var(--text-light); letter-spacing:0.04em; margin-top:1px; }
  .fin-input-wrap { position:relative; }
  .fin-input-wrap .cur {
    position:absolute; left:12px; top:50%; transform:translateY(-50%);
    font-size:10px; letter-spacing:0.1em; color:var(--text-light); pointer-events:none; font-weight:600;
  }
  .fin-input {
    width:100%; text-align:right;
    background:var(--surface2); border:1px solid var(--border);
    color:var(--vino-dark); font-family:'Inter',sans-serif;
    font-size:15px; font-weight:600; font-variant-numeric:tabular-nums;
    padding:9px 13px 9px 40px; outline:none; transition:border-color .15s, background .15s;
  }
  .fin-input.plain { padding-left:13px; text-align:right; }
  .fin-input:focus { border-color:var(--vino); background:#fff; }
  .fin-input::-webkit-outer-spin-button, .fin-input::-webkit-inner-spin-button { -webkit-appearance:none; margin:0; }
  .fin-input[type=number] { -moz-appearance:textfield; }
  .fin-readout {
    background:var(--surface3); padding:14px 16px; margin-top:6px;
  }
  .fin-readout-row {
    display:flex; align-items:center; justify-content:space-between;
    padding:5px 0; font-size:13px; color:var(--text-mid);
  }
  .fin-readout-row .v { font-variant-numeric:tabular-nums; font-weight:600; color:var(--vino-dark); }
  .fin-readout-row.total {
    border-top:1px solid var(--border-strong); margin-top:4px; padding-top:10px;
    font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:var(--vino);
  }
  .fin-readout-row.total .v { font-family:'Playfair Display',serif; font-size:21px; font-weight:400; }
  .fin-check { font-size:11px; margin-top:8px; padding:7px 12px; font-variant-numeric:tabular-nums; }
  .fin-check.ok { background:rgba(45,122,79,0.1); color:var(--green); }
  .fin-check.off { background:rgba(212,135,10,0.12); color:var(--amber); }
  .fin-check.empty { background:transparent; color:var(--text-light); padding-left:0; }
  .modal-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    background: var(--surface2);
    position: sticky;
    bottom: 0;
  }

  /* toast */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--vino);
    border-left: 3px solid var(--gold);
    padding: 12px 20px;
    font-size: 13px;
    color: #FFFFFF;
    z-index: 999;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s;
    max-width: 320px;
    box-shadow: 0 4px 20px rgba(44,24,16,0.2);
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.error { border-left-color: var(--red); background: #8B1A10; }

  /* empty state */
  .empty-state {
    padding: 40px 20px;
    text-align: center;
    color: var(--text-light);
    font-size: 13px;
    font-style: italic;
  }

  /* loading */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px;
    color: var(--text-light);
    font-size: 12px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  /* inline edit */
  .editable {
    cursor: pointer;
    border-bottom: 1px dashed transparent;
    transition: border-color 0.2s;
  }
  .editable:hover { border-bottom-color: var(--vino-dim); }

  @media (max-width: 768px) {
    #landing {
      grid-template-columns: 1fr;
    }
    #landing::after {
      width: 100%;
      height: 34%;
      opacity: 0.18;
      clip-path: none;
    }
    .landing-content {
      padding: 42px 24px;
    }
    .landing-brand {
      width: min(260px, 76vw);
      margin-bottom: 34px;
    }
    .landing-title {
      font-size: 48px;
    }
    .journey-strip { grid-template-columns: 1fr 1fr; }
    .task-card { grid-template-columns: auto 1fr auto; }
    .nav-tabs { position:fixed; bottom:0; left:0; right:0; background:var(--vino-dark); display:flex; z-index:60; box-shadow:0 -2px 12px rgba(44,24,16,0.3); }
    .nav-tab { flex:1; text-align:center; padding:13px 4px 16px; font-size:10px; border-bottom:none; border-top:2px solid transparent; }
    .nav-tab.active { border-top-color: var(--gold-light); border-bottom:none; }
    .main { padding-bottom: 96px; }
    .countdown-days { font-size:24px; }
    .countdown-row { grid-template-columns: 1fr; }
    .stats-row { grid-template-columns: 1fr 1fr; }
    .add-task-bar { grid-template-columns: 1fr; }
    .leader-task-card { grid-template-columns: 1fr; }
    .task-row { grid-template-columns: 1fr; gap: 6px; }
    .task-row-header { display: none; }
    .finance-row { grid-template-columns: 1fr 1fr; }
    .finance-row-header { display: none; }
    .topbar { padding: 0 14px; }
    .main { padding: 16px 14px; }
  }

  /* -- WEEK SCOPE TOGGLE -- */
  .week-scope {
    display: inline-flex;
    border: 1px solid var(--border-strong);
    background: var(--surface);
  }
  .week-scope-btn {
    background: transparent;
    border: none;
    padding: 8px 16px;
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-light);
    cursor: pointer;
    transition: all 0.2s;
  }
  .week-scope-btn.active {
    background: var(--vino);
    color: #FFFFFF;
  }

  /* -- MOBILE POLISH -- */
  @media (max-width: 768px) {
    html, body { overflow-x: hidden; max-width: 100vw; }
    .main { max-width: 100vw; }

    /* Bottom tab bar: swipe sideways instead of overflowing the page */
    .nav-tabs {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      justify-content: flex-start;
      scrollbar-width: none;
    }
    .nav-tabs::-webkit-scrollbar { display: none; }
    .nav-tab { flex: 0 0 auto; padding: 13px 16px 16px; }

    /* Name filter: one swipeable row instead of a wall of chips */
    .owner-filter {
      flex-wrap: nowrap;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding-bottom: 4px;
    }
    .owner-filter::-webkit-scrollbar { display: none; }
    .filter-chip { flex: 0 0 auto; padding: 8px 12px; }

    /* Team summary cards: compact two-per-row */
    .leader-summary-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
    .leader-summary-card { min-height: 0; padding: 12px 12px 10px; }
    .leader-summary-total { font-size: 21px; margin-bottom: 6px; }
    .leader-summary-breakdown { gap: 4px; }
    .leader-summary-breakdown > * { font-size: 8px; padding: 2px 5px; }

    /* Event Brief: compact on phone */
    .overview-card { padding: 14px 16px 15px; }
    .overview-grid { gap: 10px; }
    .overview-label { font-size: 10px; margin-bottom: 2px; }
    .overview-value { font-size: 17px; }
    .overview-value.muted { font-size: 13px; }

    /* Week action bar: tidy buttons */
    .week-bar { gap: 6px; }
    .week-bar .btn { padding: 8px 10px; font-size: 10px; letter-spacing: 0.1em; }
  }

  /* ── FOH BOTTOM NAV ── */
  .foh-nav-btn {
    flex: 1; text-align: center;
    padding: 14px 0 18px;
    cursor: pointer;
    transition: all 0.15s;
    border-top: 2px solid transparent;
    position: relative;
  }
  .foh-nav-btn.active {
    border-top-color: var(--vino);
  }
  .foh-nav-label {
    font-size: 10px; letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(107,31,42,0.35);
    font-family: 'Inter', sans-serif;
    font-weight: 500;
  }
  .foh-nav-btn.active .foh-nav-label {
    color: var(--vino);
    font-weight: 600;
  }
  .foh-nav-btn:hover .foh-nav-label { color: var(--vino); }

  /* ── FOH HOME ── */
  /* ── FOH HOME SCREEN ── */
  .foh-home-wrap { display:flex; flex-direction:column; gap:0; flex:1; overflow:hidden; }

  .foh-tonight-card {
    background:var(--vino);
    padding:10px 16px;
    position:relative; overflow:hidden; flex-shrink:0;
    display:flex; align-items:center; gap:16px;
  }
  .foh-tonight-card::before {
    content:''; position:absolute; top:0; left:0; right:0; height:2px;
    background:linear-gradient(90deg, var(--gold), rgba(186,155,2,0.3), transparent);
  }
  .foh-tonight-label {
    font-size:8px; letter-spacing:0.3em; text-transform:uppercase;
    color:rgba(255,255,255,0.4); margin-bottom:2px;
  }
  .foh-tonight-count {
    font-family:'Playfair Display',serif;
    font-size:36px; line-height:1; color:#fff; letter-spacing:-0.5px;
  }
  .foh-tonight-unit {
    font-size:9px; letter-spacing:0.14em; text-transform:uppercase;
    color:rgba(255,255,255,0.45); margin-top:1px;
  }
  .foh-tonight-event {
    display:inline-block;
    font-size:9px; letter-spacing:0.18em; text-transform:uppercase;
    color:var(--gold-light);
  }
  .foh-tonight-day {
    font-size:10px; letter-spacing:0.1em; text-transform:uppercase;
    color:rgba(255,255,255,0.5); margin-bottom:2px;
  }
  .foh-tonight-sync { font-size:8px; color:rgba(255,255,255,0.28); font-style:italic; margin-top:1px; }

  .foh-tomorrow-card {
    background:#fff; border:1px solid rgba(64,2,7,0.1);
    border-radius:6px; padding:18px 20px;
    display:flex; align-items:center; justify-content:space-between;
    position:relative; overflow:hidden;
  }
  .foh-tomorrow-card::before {
    content:''; position:absolute; left:0; top:0; bottom:0; width:3px;
    background:var(--gold);
  }
  .foh-tomorrow-left { padding-left:8px; }
  .foh-tomorrow-label {
    font-size:9px; letter-spacing:0.3em; text-transform:uppercase;
    color:rgba(64,2,7,0.4); margin-bottom:6px;
  }
  .foh-tomorrow-day {
    font-size:12px; letter-spacing:0.1em; text-transform:uppercase;
    color:var(--vino); font-weight:600;
  }
  .foh-tomorrow-event { font-size:11px; color:rgba(64,2,7,0.5); margin-top:3px; font-style:italic; }
  .foh-tomorrow-count {
    font-family:'Playfair Display',serif; font-size:44px; color:var(--vino); line-height:1;
  }
  .foh-tomorrow-unit {
    font-size:9px; letter-spacing:0.2em; text-transform:uppercase;
    color:rgba(64,2,7,0.35); text-align:right; margin-top:2px;
  }

  .foh-quick-tiles { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .foh-quick-tile {
    background:#fff; border:1px solid rgba(64,2,7,0.1);
    border-radius:6px; padding:16px; cursor:pointer;
    text-align:center; transition:background 0.15s;
  }
  .foh-quick-tile:active { background:rgba(64,2,7,0.05); }
  .foh-quick-tile-icon { font-size:22px; margin-bottom:6px; }
  .foh-quick-tile-label {
    font-size:9px; letter-spacing:0.25em; text-transform:uppercase;
    color:var(--vino); font-weight:600;
  }
  .foh-quick-tile-sub { font-size:10px; color:rgba(64,2,7,0.45); margin-top:3px; font-style:italic; }

  /* ── FOH MODULE CARDS ── */
  /* ── FOH MODULE BOXES — 3 style variants ── */

  /* switcher bar */
  .foh-opt-bar {

    color:var(--text-light); cursor:pointer; transition:all 0.12s;
  }
  .foh-opt-btn+.foh-opt-btn { border-left:none; }
  .foh-opt-btn.active { background:var(--vino); color:#fff; border-color:var(--vino); }

  .foh-mods-a { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; padding:0 12px 12px; }

  /* STYLE B — 2-col grid, taller boxes */

    background:#fff; border:1px solid rgba(107,31,42,0.1);

    cursor:pointer; transition:background 0.12s;

  }
  .foh-mod-b.dim { opacity:0.35; pointer-events:none; border-left-color:#ddd; }

  .foh-mod-b .fm-arrow { font-size:16px; margin-top:8px; }

  .foh-mod-c {
    background:#fff; border:1px solid rgba(107,31,42,0.1);
    padding:10px 14px; cursor:pointer; transition:background 0.12s;
    display:flex; align-items:center; gap:12px;
    box-shadow:0 1px 3px rgba(44,24,16,0.05);
  }
  .foh-mod-c.dim { opacity:0.35; pointer-events:none; }
  .foh-mod-c:active { background:var(--surface2); }
  .foh-mod-c-body { flex:1; }
  .foh-mod-c .fm-name { font-size:15px; }
  .foh-mod-c .fm-arrow { font-size:18px; }let fohBoxStyle = localStorage.getItem('foh_box') || 'a';
function fohSetBox(s){
  fohBoxStyle = s;
  try{ localStorage.setItem('foh_box',s); }catch(e){}
  document.querySelectorAll('.foh-opt-btn').forEach(b=>b.classList.toggle('active', b.dataset.s===s));
  ['a','b','c'].forEach(v=>{
    const el = document.getElementById('foh-mods-'+v);
    if(el) el.style.display = v===s ? (v==='c'?'flex':'grid') : 'none';
  });
}

function fohModsHTML(){
  const mods = [
    { tag:'Live',        name:'Schedule',          desc:"Today's team & shifts",         action:"fohTab('schedule')", dim:false },
    { tag:'Live',        name:'Events & Reports',  desc:'Events, jazz, weekly planning', action:"fohTab('manager')",  dim:false },
    { tag:'Coming soon', name:'Operations',        desc:'Briefings & standards',         action:'',                  dim:true  },
  ];
  // STYLE A — 3-col boxes
  const a = `<div id="foh-mods-a" class="foh-mods-a" style="display:${fohBoxStyle==='a'?'grid':'none'}">` +
    mods.map(m=>`
      <div class="foh-mod-a${m.dim?' dim':''}" ${m.action?`onclick="${m.action}"`:''}> 
        <div class="fm-tag${m.dim?' soon':''}">${m.tag}</div>
        <div class="fm-name">${m.name}</div>
        <div class="fm-desc">${m.desc}</div>
        ${!m.dim?'<div class="fm-arrow">›</div>':''}
      </div>`).join('') + '</div>';
  // STYLE B — 2-col boxes
  const b = `<div id="foh-mods-b" class="foh-mods-b" style="display:${fohBoxStyle==='b'?'grid':'none'}">` +
    mods.map(m=>`
      <div class="foh-mod-b${m.dim?' dim':''}" ${m.action?`onclick="${m.action}"`:''}> 
        <div>
          <div class="fm-tag${m.dim?' soon':''}">${m.tag}</div>
          <div class="fm-name">${m.name}</div>
          <div class="fm-desc">${m.desc}</div>
        </div>
        ${!m.dim?'<div class="fm-arrow">›</div>':''}
      </div>`).join('') + '</div>';
  // STYLE C — single col compact
  const c = `<div id="foh-mods-c" class="foh-mods-c" style="display:${fohBoxStyle==='c'?'flex':'none'}">` +
    mods.map(m=>`
      <div class="foh-mod-c${m.dim?' dim':''}" ${m.action?`onclick="${m.action}"`:''}> 
        <div class="foh-mod-c-body">
          <div class="fm-tag${m.dim?' soon':''}">${m.tag}</div>
          <div class="fm-name">${m.name}</div>
          <div class="fm-desc">${m.desc}</div>
        </div>
        ${!m.dim?'<div class="fm-arrow">›</div>':''}
      </div>`).join('') + '</div>';
  return a + b + c;
}

async function renderFohHome(){
  const el = document.getElementById('foh-tab-content');
  const today = fohTodayShort();
  const tomorrow = fohTomorrowShort();
  const todayEvent = FOH_EVENTS[today] || '';
  const tomorrowEvent = FOH_EVENTS[tomorrow] || '';

  const now = new Date();
  const dateEl = document.getElementById('foh-date-display');
  if(dateEl) dateEl.textContent = now.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});

  el.style.cssText = 'flex:1;max-width:600px;margin:0 auto;width:100%;overflow:hidden;display:flex;flex-direction:column;';

  el.innerHTML = `
    <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;">

      <div class="foh-tonight-card">
        <div style="flex:1;">
          <div class="foh-tonight-label">Tonight</div>
          <div class="foh-tonight-count" id="foh-tn-count">—</div>
          <div class="foh-tonight-unit">covers booked</div>
        </div>
        <div style="text-align:right;">
          <div class="foh-tonight-day">${fohDateLabel(today)}${todayEvent?' · '+todayEvent:''}</div>
          <div style="margin-top:4px;">
            <span style="font-family:'Playfair Display',serif;font-size:24px;color:rgba(255,255,255,0.75)" id="foh-tm-count">—</span>
            <span style="font-size:9px;color:rgba(255,255,255,0.4);letter-spacing:0.1em;text-transform:uppercase;margin-left:4px;">tomorrow${tomorrowEvent?' · '+tomorrowEvent:''}</span>
          </div>
          <div class="foh-tonight-sync" id="foh-tn-sync">Loading…</div>
        </div>
      </div>

      <div class="foh-opt-bar">
        <button class="foh-opt-btn${fohBoxStyle==='a'?' active':''}" data-s="a" onclick="fohSetBox('a')">A · 3 col</button>
        <button class="foh-opt-btn${fohBoxStyle==='b'?' active':''}" data-s="b" onclick="fohSetBox('b')">B · 2 col</button>
        <button class="foh-opt-btn${fohBoxStyle==='c'?' active':''}" data-s="c" onclick="fohSetBox('c')">C · List</button>
      </div>

      <div style="flex:1;overflow:hidden;background:var(--bg);display:flex;flex-direction:column;justify-content:center;">
        ${fohModsHTML()}
      </div>

    </div>
  `;

  try {
    const todayISO_ = localISO(new Date());
    const tomorrowDate = new Date(); tomorrowDate.setDate(tomorrowDate.getDate()+1);
    const tomorrowISO_ = localISO(tomorrowDate);
    const { data, error } = await sbKitchen.from('covers').select('service_date,night_covers').in('service_date',[todayISO_,tomorrowISO_]);
    if(error) throw error;
    const tr = (data||[]).find(r=>String(r.service_date).slice(0,10)===todayISO_);
    const tmr = (data||[]).find(r=>String(r.service_date).slice(0,10)===tomorrowISO_);
    document.getElementById('foh-tn-count').textContent = tr?(tr.night_covers??'—'):'—';
    document.getElementById('foh-tm-count').textContent = tmr?(tmr.night_covers??'—'):'—';
    document.getElementById('foh-tn-sync').textContent = 'Live · SevenRooms';
  } catch(e) {
    const s = document.getElementById('foh-tn-sync'); if(s) s.textContent='Could not load';
  }
}
