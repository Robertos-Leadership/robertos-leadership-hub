name: Deploy DEV to GitHub Pages

# Faster, more reliable deploy for the FOH DEV site.
# - Skips the legacy Jekyll build (this is a plain static site, no build step).
# - Publishes the whole repo as-is.
# - The green check on this run = the site is actually live on the CDN.
# DEV REPO ONLY (robertos-foh-dev). The LIVE repo still uses its own normal deploy.

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # lets you re-deploy by hand from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; if a newer push comes in, drop the older one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site (whole repo, no Jekyll)
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
